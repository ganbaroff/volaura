name: Atlas Daily Digest

on:
  # 2026-04-19: cron disabled at CEO's request — "пусть будет тишина дальше
  # решим". Part of the telegram silence-sweep. Re-enable only after shell
  # silence-gate honors memory/atlas/telegram-silenced-until.txt.
  # schedule:
  #   - cron: '0 23 * * *'  # 23:00 UTC = 03:00 Baku (E6 spec)
  workflow_dispatch:

concurrency:
  group: atlas-daily-digest
  cancel-in-progress: false

permissions:
  contents: write   # append to digest-log.jsonl

jobs:
  digest:
    name: Build + send digest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build and send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
        run: python scripts/atlas_daily_digest.py

      - name: Commit digest log
        run: |
          git config user.name "Atlas Digest"
          git config user.email "atlas-digest@volaura.app"
          # Add independently — absence of one file must not silently skip the other.
          [ -f memory/atlas/digest-log.jsonl ] && git add memory/atlas/digest-log.jsonl || true
          [ -f memory/atlas/digest-offline.md ] && git add memory/atlas/digest-offline.md || true
          if git diff --staged --quiet; then
            echo "Nothing to commit (no digest files touched this run)."
            exit 0
          fi
          git commit -m "atlas-digest: $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash origin main || true
          git push || echo "Push failed — next tick will retry"
