name: ADAS Weekly Agent Designer

on:
  # DISABLED 2026-04-14 Session 110: packages.swarm.adas_agent_designer was
  # moved to packages/swarm/archive/ (session 94 demolition — 51 skill files
  # pruned; this module was archived along with them). CRON fired every
  # Sunday and failed with ModuleNotFoundError. Keeping workflow_dispatch so
  # we can hand-run it after restoring the module OR writing an equivalent
  # on top of the new atlas-memory knowledge base.
  # schedule:
  #   - cron: '0 6 * * 0'
  workflow_dispatch: {}

jobs:
  adas-design:
    name: Design New Agent from Failure Archive
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install google-genai python-telegram-bot python-dotenv loguru pydantic

      - name: Run ADAS meta-agent designer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
        run: |
          cd "${{ github.workspace }}"
          python -m packages.swarm.adas_agent_designer

      - name: Commit agent proposal
        run: |
          git config user.name "MiroFish Swarm"
          git config user.email "swarm@volaura.app"
          # Guard glob: `git add path/*.foo` fails with exit 128 under `set -e`
          # when nothing matches — kills the step. Expand with shell first and
          # only call git add when at least one file exists.
          shopt -s nullglob
          FILES=(memory/swarm/skills/*.agent-proposal.md)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No agent proposal files generated this run — skip."
            exit 0
          fi
          git add "${FILES[@]}"
          if git diff --staged --quiet; then
            echo "No new agent proposals to commit."
          else
            git pull --rebase --autostash origin main
            git commit -m "swarm(adas): weekly agent design proposal — $(date -u +%Y-%m-%d)"
            git push
          fi
