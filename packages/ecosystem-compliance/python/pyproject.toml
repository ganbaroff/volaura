[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ecosystem-compliance"
version = "0.1.0"
description = "Shared GDPR Art.22 + EU AI Act + AZ PDPA compliance models for the VOLAURA ecosystem (volaura, mindshift, lifesim, brandedby, zeus)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6,<3",
]

[tool.setuptools.packages.find]
include = ["ecosystem_compliance*"]
