name: Post-Deploy Health Check

# Triggered after every successful Vercel deployment to main.
# Runs the swarm in post-deploy mode: rapid security + health scan.
# Sends result to CEO via Telegram within 2 minutes of deploy.

on:
  # 2026-04-19: push trigger disabled at CEO's request — "пусть будет тишина
  # дальше решим". Fires once per main push and sends a CEO-facing Telegram
  # summary — with 20+ pushes today that produced noticeable noise.
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      deploy_sha:
        description: 'SHA of the deployed commit (optional)'
        required: false
        default: ''

jobs:
  post-deploy-check:
    name: Post-Deploy Swarm Scan
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10  # Need recent history for diff analysis

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install swarm dependencies
        run: |
          pip install pydantic loguru groq google-genai python-dotenv python-telegram-bot httpx supabase

      - name: Wait for Railway deploy to settle
        # Railway deploy typically takes 60-90s after push. Give it 2 minutes.
        if: github.event_name == 'push'
        run: sleep 120

      - name: Run post-deploy swarm scan
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DEPLOY_SHA: ${{ github.event.inputs.deploy_sha || github.sha }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          SWARM_DATA_DIR: memory/swarm/structured
        run: |
          cd "${{ github.workspace }}"
          python -m packages.swarm.autonomous_run \
            --mode=post-deploy \
            --skip-consolidation \
            --trigger-meta="{\"sha\":\"$DEPLOY_SHA\",\"branch\":\"$DEPLOY_BRANCH\"}"

      - name: Commit any new proposals to memory
        run: |
          git config user.name "MiroFish Swarm"
          git config user.email "swarm@volaura.app"
          git add memory/swarm/proposals.json memory/swarm/heartbeat-log.jsonl || true
          if git diff --staged --quiet; then
            echo "No memory changes to commit."
          else
            git pull --rebase origin main
            git commit -m "swarm: post-deploy scan — $(date -u +%Y-%m-%d\ %H:%M) UTC"
            git push
          fi
