name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm vitest run

      - name: Build
        run: pnpm build

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check app/

      - name: Format check (ruff)
        run: ruff format --check app/

      - name: Tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  shame-free:
    name: Constitution Law 3 (Shame-Free Language)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Shame-free language check
        run: python scripts/lint_shame_free.py

  tg-mini:
    name: Telegram Mini App
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/tg-mini

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: npm audit (high severity)
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          # Simple secret detection — block commits with API keys
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" --include="*.ts" --include="*.tsx" --include="*.py" --include="*.env" apps/ packages/ 2>/dev/null; then
            echo "::error::Possible API key found in source code!"
            exit 1
          fi
          if grep -rn "AIza[a-zA-Z0-9_-]\{35\}" --include="*.ts" --include="*.tsx" --include="*.py" apps/ packages/ 2>/dev/null; then
            echo "::error::Possible Google API key found in source code!"
            exit 1
          fi
          echo "No secrets detected."

  control-plane:
    name: Control Plane (daemon + litellm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install pytest pytest-asyncio litellm loguru pydantic
          python -m pip install -r apps/api/requirements.txt

      - name: Control-plane tests
        run: |
          pytest tests/test_atlas_swarm_daemon_*.py \
            tests/test_litellm_adapter.py \
            tests/test_daemon_task_seeder.py \
            -q --tb=short
        env:
          APP_ENV: test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[e2e]')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test tests/e2e/full-journey.spec.ts --reporter=list
        env:
          E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VOLAURA_API_URL: https://volauraapi-production.up.railway.app
