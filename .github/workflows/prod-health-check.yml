name: Prod Health Check

# Synthetic endpoint monitor — G4.3 (sprint 2026-04).
# Checks VOLAURA API (/health) and frontend every 15 min.
# Silent on success. Fires Telegram only on failure.
# Does not commit state — stateless check.

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}

concurrency:
  group: prod-health-check
  cancel-in-progress: false

jobs:
  check:
    name: HTTP health probe
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Probe VOLAURA API
        id: api
        run: |
          STATUS=$(curl -sS -o /tmp/api_body.json -w "%{http_code}" \
            --max-time 10 \
            https://volauraapi-production.up.railway.app/health)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "API health: $STATUS"
          cat /tmp/api_body.json || true

      - name: Probe VOLAURA Frontend
        id: web
        run: |
          # Use Vercel deployment URL — volaura.app returns 403 from GH Actions IPs
          # due to Vercel bot protection (false positive, not real downtime).
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            --location \
            https://volaura-v2.vercel.app)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Frontend health: $STATUS"

      - name: Probe Atlas Telegram Bot
        id: bot
        run: |
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            https://fantastic-generosity-production-df90.up.railway.app/health)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Bot health: $STATUS"

      - name: Evaluate results
        id: eval
        run: |
          API=${{ steps.api.outputs.status }}
          WEB=${{ steps.web.outputs.status }}
          BOT=${{ steps.bot.outputs.status }}
          FAILED=""
          if [ "$API" != "200" ]; then FAILED="API($API)"; fi
          if [ "$WEB" != "200" ] && [ "$WEB" != "307" ] && [ "$WEB" != "308" ]; then
            FAILED="${FAILED:+$FAILED, }Web($WEB)"
          fi
          if [ "$BOT" != "200" ]; then
            FAILED="${FAILED:+$FAILED, }Bot($BOT)"
          fi
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          if [ -n "$FAILED" ]; then
            echo "HEALTH ALERT: $FAILED"
            exit 1
          else
            echo "All probes green."
          fi

      - name: Alert via Telegram
        if: failure() && steps.eval.outputs.failed != ''
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
        run: |
          MSG="🔴 Prod health alert — ${{ steps.eval.outputs.failed }} DOWN. API: ${{ steps.api.outputs.status }}, Web: ${{ steps.web.outputs.status }}, Bot: ${{ steps.bot.outputs.status }}. Run: ${{ github.run_id }}"
          curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d text="$MSG"
