name: Atlas Proactive Loop

on:
  # DISABLED 2026-04-16: packages.swarm.atlas_proactive was archived per
  # packages/atlas-memory/knowledge/swarm-engine-decision-2026-04-13.md
  # (superseded by atlas_memory). Cron was firing every 2h and failing every time —
  # wasted CI minutes. Re-enable once atlas_memory equivalent lands.
  # schedule:
  #   - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing, for CEO-initiated on-demand wakes,
    # and — most importantly — for webhook-triggered autonomous wakes from
    # any service (swarm worker, external agent, Yusif's phone, future bots)
    # that needs Atlas to work on a specific topic right now.
    #
    # Trigger from anywhere with gh CLI installed:
    #   gh workflow run atlas-proactive.yml --ref main \
    #     --field topic_id=latest-ai-agent-memory-tools-2026
    #
    # Or via GitHub API (curl) with a PAT:
    #   curl -X POST -H "Authorization: Bearer $GH_PAT" \
    #     https://api.github.com/repos/ganbaroff/volaura/actions/workflows/atlas-proactive.yml/dispatches \
    #     -d '{"ref":"main","inputs":{"topic_id":"coordinator-agent-patterns"}}'
    inputs:
      topic_id:
        description: 'Specific topic ID from proactive_queue.json to process. Leave blank for normal queue selection.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: atlas-proactive
  cancel-in-progress: false

jobs:
  proactive-wake:
    name: Atlas Proactive Wake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python --version
          pip install loguru pydantic litellm google-genai groq aiohttp

      - name: Run Atlas proactive worker
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # ATLAS_TOPIC_ID is passed through from workflow_dispatch input.
          # When empty, the worker uses normal queue selection. When set,
          # the worker processes that specific topic — this is the webhook-
          # triggered autonomous wake path.
          ATLAS_TOPIC_ID: ${{ inputs.topic_id }}
        run: |
          cd "${{ github.workspace }}"
          python -m packages.swarm.atlas_proactive

      - name: Write-scope guard
        # Enforce that atlas-proactive only ever touches:
        #   memory/atlas/inbox/
        #   memory/atlas/proactive_queue.json
        #   memory/atlas/.wake-counter
        # If anything outside those paths changed, fail the workflow so CEO can
        # investigate. This is the security boundary — proactive loop must never
        # touch identity.md, wake.md, CLAUDE.md, ADRs, production code.
        run: |
          cd "${{ github.workspace }}"
          CHANGED=$(git status --porcelain | awk '{print $2}')
          if [ -z "$CHANGED" ]; then
            echo "No changes, skipping scope check."
            exit 0
          fi
          echo "Changed files:"
          echo "$CHANGED"
          OUTSIDE_SCOPE=$(echo "$CHANGED" | grep -v '^memory/atlas/inbox/' | grep -v '^memory/atlas/proactive_queue.json$' | grep -v '^memory/atlas/\.wake-counter$' || true)
          if [ -n "$OUTSIDE_SCOPE" ]; then
            echo "::error::Atlas proactive loop touched files outside allowed scope:"
            echo "$OUTSIDE_SCOPE"
            exit 1
          fi
          echo "All changes within allowed scope."

      - name: Commit and push
        run: |
          cd "${{ github.workspace }}"
          git config user.name "Atlas Proactive"
          git config user.email "atlas-proactive@volaura.app"
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add memory/atlas/inbox/ memory/atlas/proactive_queue.json memory/atlas/.wake-counter
          # Extract topic for commit message
          NEWEST_NOTE=$(ls -t memory/atlas/inbox/ 2>/dev/null | head -n 1 || echo "heartbeat")
          git commit -m "atlas-proactive: wake — ${NEWEST_NOTE}"
          git pull --rebase origin main || true
          git push
