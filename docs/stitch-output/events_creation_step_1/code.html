<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Event | Volaura</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#13131b",
              "inverse-surface": "#e4e1ed",
              "secondary": "#bdc2ff",
              "on-surface": "#e4e1ed",
              "on-tertiary-container": "#4c3f00",
              "on-primary": "#1000a9",
              "secondary-container": "#2f3aa3",
              "on-tertiary-fixed-variant": "#544600",
              "primary": "#c0c1ff",
              "inverse-on-surface": "#303038",
              "on-secondary-fixed-variant": "#2f3aa3",
              "surface-container-lowest": "#0d0d15",
              "on-primary-fixed-variant": "#2f2ebe",
              "inverse-primary": "#494bd6",
              "surface-container": "#1f1f27",
              "primary-fixed-dim": "#c0c1ff",
              "tertiary-fixed": "#ffe16d",
              "secondary-fixed": "#e0e0ff",
              "error-container": "#93000a",
              "surface-tint": "#c0c1ff",
              "surface": "#13131b",
              "on-secondary-fixed": "#000767",
              "on-primary-fixed": "#07006c",
              "primary-container": "#8083ff",
              "error": "#ffb4ab",
              "surface-container-high": "#292932",
              "on-background": "#e4e1ed",
              "surface-container-low": "#1b1b23",
              "outline-variant": "#464554",
              "on-error-container": "#ffdad6",
              "primary-fixed": "#e1e0ff",
              "tertiary": "#e9c400",
              "on-tertiary-fixed": "#221b00",
              "on-tertiary": "#3a3000",
              "on-secondary": "#131e8c",
              "tertiary-container": "#c9a900",
              "on-primary-container": "#0d0096",
              "surface-variant": "#34343d",
              "background": "#13131b",
              "tertiary-fixed-dim": "#e9c400",
              "secondary-fixed-dim": "#bdc2ff",
              "outline": "#908fa0",
              "surface-bright": "#393841",
              "surface-container-highest": "#34343d",
              "on-error": "#690005",
              "on-surface-variant": "#c7c4d7",
              "on-secondary-container": "#a8afff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .aura-gradient-text {
            background: linear-gradient(135deg, #c0c1ff 0%, #8083ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .glass-panel {
            background: rgba(27, 27, 35, 0.7);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#13131b]/70 backdrop-blur-xl shadow-2xl shadow-black/40">
<div class="flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#292932] transition-colors duration-200 text-[#c0c1ff]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-semibold text-[#c0c1ff]">Create Event</h1>
</div>
<button class="px-5 py-2 rounded-xl text-sm font-semibold text-[#c0c1ff] hover:bg-[#292932] transition-colors duration-200">
                Preview
            </button>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Progress Indicator -->
<section class="mb-10">
<div class="flex items-end justify-between mb-4">
<div>
<span class="text-secondary font-semibold text-xs uppercase tracking-widest block mb-1">Step 1 of 3</span>
<h2 class="font-headline text-2xl font-bold tracking-tight">Event Details</h2>
</div>
<div class="flex gap-1.5 mb-1.5">
<div class="h-1.5 w-12 rounded-full bg-primary shadow-[0_0_12px_rgba(192,193,255,0.4)]"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-container-high"></div>
<div class="h-1.5 w-8 rounded-full bg-surface-container-high"></div>
</div>
</div>
</section>
<!-- Form Canvas -->
<div class="space-y-8">
<!-- Section 1: Basic Info -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-icon="info">info</span>
</div>
<h3 class="font-headline text-lg font-semibold">Basic Info</h3>
</div>
<div class="space-y-4">
<div class="group">
<label class="block text-xs font-medium text-outline mb-2 ml-1">Event Name</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline/50 transition-all" placeholder="e.g., COP30 Environmental Summit" type="text"/>
</div>
<div class="group">
<label class="block text-xs font-medium text-outline mb-2 ml-1">Category</label>
<div class="relative">
<select class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 appearance-none focus:ring-2 focus:ring-primary/50 text-on-surface transition-all">
<option>Environmental</option>
<option>Social Impact</option>
<option>Education</option>
<option>Technology</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<div class="group">
<label class="block text-xs font-medium text-outline mb-2 ml-1">Description</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline/50 transition-all resize-none" placeholder="Tell volunteers about the mission..." rows="4"></textarea>
</div>
</div>
</section>
<!-- Section 2: Logistics -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-icon="location_on">location_on</span>
</div>
<h3 class="font-headline text-lg font-semibold">Logistics</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="group">
<label class="block text-xs font-medium text-outline mb-2 ml-1">Date</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 focus:ring-2 focus:ring-primary/50 text-on-surface transition-all" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline text-sm" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="group">
<label class="block text-xs font-medium text-outline mb-2 ml-1">Location</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 focus:ring-2 focus:ring-primary/50 text-on-surface placeholder:text-outline/50 transition-all" placeholder="Baku, Azerbaijan" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline text-sm" data-icon="map">map</span>
</div>
</div>
</div>
</section>
<!-- Section 3: Volunteer Requirements -->
<section class="space-y-6">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-sm" data-icon="star">star</span>
</div>
<h3 class="font-headline text-lg font-semibold">Volunteer Requirements</h3>
</div>
<div class="bg-surface-container-low rounded-2xl p-6 space-y-8">
<!-- AURA Score Slider -->
<div>
<div class="flex justify-between items-center mb-6">
<label class="text-sm font-medium text-on-surface">Minimum AURA Score</label>
<span class="text-primary font-bold font-headline text-xl">60+</span>
</div>
<div class="relative w-full h-2 bg-surface-container-high rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-[60%] bg-gradient-to-r from-primary to-primary-container"></div>
<div class="absolute top-1/2 left-[60%] -translate-y-1/2 w-5 h-5 bg-white rounded-full shadow-lg border-2 border-primary cursor-pointer"></div>
</div>
<p class="mt-4 text-[10px] text-outline uppercase tracking-wider font-medium">Higher scores attract elite volunteers</p>
</div>
<!-- Skills Tags -->
<div>
<label class="block text-sm font-medium text-on-surface mb-4">Required Skills</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-on-primary text-xs font-semibold flex items-center gap-2">
                                Teamwork <span class="material-symbols-outlined text-xs" data-icon="close">close</span>
</button>
<button class="px-4 py-2 rounded-full bg-primary text-on-primary text-xs font-semibold flex items-center gap-2">
                                Leadership <span class="material-symbols-outlined text-xs" data-icon="close">close</span>
</button>
<button class="px-4 py-2 rounded-full bg-surface-container-high text-outline text-xs font-semibold border border-outline/10 hover:border-primary/40 transition-all flex items-center gap-2">
                                + Add Skill
                            </button>
</div>
</div>
</div>
</section>
</div>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pointer-events-none">
<div class="max-w-2xl mx-auto pointer-events-auto">
<button class="w-full group relative overflow-hidden bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-bold text-lg py-5 rounded-2xl shadow-[0_8px_32px_rgba(128,131,255,0.3)] hover:shadow-[0_12px_48px_rgba(128,131,255,0.5)] transition-all transform active:scale-95">
<span class="relative z-10 flex items-center justify-center gap-2">
                        Növbəti
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</span>
<!-- Pulse Effect Placeholder -->
<div class="absolute inset-0 bg-white/20 opacity-0 group-hover:animate-pulse"></div>
</button>
</div>
</div>
</main>
<!-- Invisible spacer for bottom bar -->
<div class="h-24"></div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[400px] h-[400px] bg-secondary/5 blur-[100px] rounded-full"></div>
</body></html>
