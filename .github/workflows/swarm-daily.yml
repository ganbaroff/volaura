name: Swarm Daily Autonomy

on:
  schedule:
    # Daily ideation: every day at 05:00 UTC (09:00 Baku time, AZT = UTC+4)
    - cron: '0 5 * * *'
    # Weekly audit: every Monday at 06:00 UTC — systemic patterns, not individual issues
    - cron: '0 6 * * 1'
    # Monthly review: 1st of month at 07:00 UTC — strategic, CEO-facing
    - cron: '0 7 1 * *'
    # Weekly simulation: every Wednesday at 08:00 UTC — 10 personas, UX friction report
    - cron: '0 8 * * 3'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'daily-ideation'
        type: choice
        options:
          - daily-ideation
          - code-review
          - cto-audit
          - weekly-audit
          - monthly-review
          - post-deploy
          - coordinator
          - simulate

jobs:
  swarm-run:
    name: Swarm Autonomous Run
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install swarm dependencies
        run: |
          # aider-chat: required by scripts/swarm_coder.py for autonomous code edits
          # pytest: swarm_coder's test_runner_gate runs targeted tests on changed modules
          pip install pydantic loguru groq google-genai python-dotenv python-telegram-bot aiohttp supabase tavily-python litellm openai nest-asyncio aider-chat pytest

      - name: Configure git for autonomous commits
        run: |
          git config --global user.name "MiroFish Swarm"
          git config --global user.email "swarm@volaura.app"

      - name: Heartbeat gate (KAIROS — should swarm run?)
        id: gate
        run: |
          cd "${{ github.workspace }}"
          # Exit 0 = RUN, Exit 1 = SKIP
          # On manual dispatch (workflow_dispatch), always run regardless of gate
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "[heartbeat_gate] BYPASS: manual dispatch — always run"
          else
            if python -m packages.swarm.heartbeat_gate; then
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Resolve run mode from schedule or manual dispatch
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # Detect which cron fired by UTC hour
            HOUR=$(date -u +%H)
            DAY=$(date -u +%d)
            WEEKDAY=$(date -u +%u)  # 1=Monday
            if [ "$DAY" = "01" ] && [ "$HOUR" = "07" ]; then
              echo "mode=monthly-review" >> $GITHUB_OUTPUT
            elif [ "$WEEKDAY" = "1" ] && [ "$HOUR" = "06" ]; then
              echo "mode=weekly-audit" >> $GITHUB_OUTPUT
            elif [ "$WEEKDAY" = "3" ] && [ "$HOUR" = "08" ]; then
              echo "mode=simulate" >> $GITHUB_OUTPUT
            else
              echo "mode=daily-ideation" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run autonomous swarm
        if: steps.gate.outputs.should_run == 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Persist StructuredMemory (4-network: World/Experience/Opinion/Failure) in the repo
          # instead of ~/.swarm/ (lost after each runner). See packages/swarm/structured_memory.py.
          SWARM_DATA_DIR: memory/swarm/structured
          # Auto-fix loop: swarm_coder implements top-N AUTO-safe proposals via Aider.
          # Cap of 3 keeps the morning commit list reviewable; set SWARM_AUTO_FIX=0 to disable.
          SWARM_AUTO_FIX: "1"
          SWARM_AUTO_FIX_MAX: "3"
          # Aider model for autonomous code edits.
          # cerebras/qwen-3-235b: not in aider's model registry → 300s timeout every call.
          # gemini/gemini-2.0-flash: deprecated for this API key ("no longer available to new").
          # groq/llama-3.3-70b-versatile: in aider's registry, 131K ctx (enough for .md edits).
          SWARM_CODER_MODEL: "groq/llama-3.3-70b-versatile"
        run: |
          cd "${{ github.workspace }}"
          # Build keyword index of docs/*.md so swarm_coder's discover_target_files()
          # can find relevant files. Without this, target_files=[] and safety_gate
          # returns LOW for every proposal, blocking all auto-fixes.
          python scripts/project_qa.py --rebuild-index || echo "[warn] project_qa index build failed (non-blocking)"
          python -m packages.swarm.autonomous_run --mode=${{ steps.mode.outputs.mode }}

      - name: Skip notice
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "⏭ Swarm skipped by heartbeat gate: no recent git activity, no urgent proposals, stale floor not reached."
          echo "To force a run: use workflow_dispatch."

      - name: Trend Scout — daily innovation scan
        if: steps.gate.outputs.should_run == 'true' && steps.mode.outputs.mode == 'daily-ideation'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
        run: |
          cd "${{ github.workspace }}"
          python3 -c "
          import urllib.request, json, os, datetime

          GEMINI_KEY = os.environ.get('GEMINI_API_KEY', '')
          if not GEMINI_KEY:
              print('No GEMINI_API_KEY — skipping trend scout')
              exit(0)

          prompt = '''You are Trend Scout for Volaura (verified talent platform, Azerbaijan).
          Scan: GitHub Trending, Product Hunt, AI agent news, HR tech, assessment platforms.
          Date: ''' + datetime.date.today().isoformat() + '''

          Report format:
          HOT (act this week): 1-2 items with link
          WATCH (interesting): 1-2 items
          NOISE (skip): 1 item

          Max 200 words. Russian.'''

          payload = json.dumps({
              'contents': [{'parts': [{'text': prompt}]}],
              'systemInstruction': {'parts': [{'text': 'Innovation researcher. Russian. Concise.'}]},
              'generationConfig': {'maxOutputTokens': 400, 'temperature': 1.0}
          }).encode()
          url = f'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key={GEMINI_KEY}'
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  result = json.loads(r.read())['candidates'][0]['content']['parts'][0]['text']
              # Save to log
              log_path = 'memory/swarm/trend-scout-log.md'
              header = f'## {datetime.date.today().isoformat()}\n\n'
              existing = ''
              try:
                  with open(log_path, 'r', encoding='utf-8') as f:
                      existing = f.read()
              except FileNotFoundError:
                  existing = '# Trend Scout Daily Log\n\n'
              with open(log_path, 'w', encoding='utf-8') as f:
                  f.write(existing.split('##')[0] + header + result + '\n\n---\n\n' + '##'.join(existing.split('##')[1:]) if '##' in existing else existing + header + result + '\n')
              print(f'Trend Scout: saved to {log_path}')

              # Send to CEO via Telegram
              BOT_TOKEN = os.environ.get('TELEGRAM_BOT_TOKEN', '')
              CHAT_ID = os.environ.get('TELEGRAM_CEO_CHAT_ID', '')
              if BOT_TOKEN and CHAT_ID:
                  msg = f'🔭 TREND SCOUT — {datetime.date.today().isoformat()}\n\n{result[:3500]}'
                  tg_payload = json.dumps({'chat_id': CHAT_ID, 'text': msg}).encode()
                  tg_req = urllib.request.Request(f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage',
                      data=tg_payload, headers={'Content-Type': 'application/json'})
                  urllib.request.urlopen(tg_req, timeout=10)
                  print('Sent to CEO via Telegram')
          except Exception as e:
              print(f'Trend Scout error: {e}')
          "

      - name: Commit proposals and memory
        run: |
          # git user/email already configured globally in the "Configure git" step above.
          # Aider's auto-commits during the swarm run may have already created commits
          # on HEAD — we only need to wrap any REMAINING uncommitted memory changes.

          # Include heartbeat log even if swarm was skipped (gate decision is worth recording)
          git add memory/swarm/

          have_staged=0
          if ! git diff --staged --quiet; then have_staged=1; fi

          have_aider_commits=0
          if [ "$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)" -gt 0 ]; then
            have_aider_commits=1
          fi

          if [ "$have_staged" = "0" ] && [ "$have_aider_commits" = "0" ]; then
            echo "No new proposals, memory updates, or aider commits to push."
            exit 0
          fi

          if [ "$have_staged" = "1" ]; then
            if [ "${{ steps.gate.outputs.should_run }}" = "true" ]; then
              git commit -m "swarm: daily autonomous run — $(date -u +%Y-%m-%d)"
            else
              git commit -m "swarm: heartbeat gate skip — $(date -u +%Y-%m-%d)"
            fi
          fi

          # Rebase on top of origin/main. Stash -u includes untracked (.swarm/) to
          # avoid the "index contains uncommitted changes" error the old flow hit.
          git stash push -u -m "swarm-run-untracked" || true
          git pull --rebase origin main || {
            echo "::warning::rebase failed — aborting and pushing anyway"
            git rebase --abort || true
          }
          git stash pop || true

          git push || {
            echo "::warning::push failed — likely raced with another writer; trying fetch+rebase+push once"
            git fetch origin main
            git rebase origin/main || git rebase --abort || true
            git push
          }
