name: Atlas Workflow Watchdog

on:
  # Hourly scan. Catches silent-red CRONs within an hour of second failure.
  # 2026-04-19: cron disabled — CEO reported 100+ telegrams/day from all
  # scheduled workflows combined. This one contributed 24/day. Re-enable
  # only after shell-level silence-gate (mirror of telegram_gate.py) is
  # wired into the workflow, so the silence-file in memory/atlas/ actually
  # applies to curl-based senders too. Manual dispatch still available.
  # schedule:
  #   - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: atlas-watchdog
  cancel-in-progress: false

permissions:
  contents: write  # needs write to commit notification-log.jsonl for cooldown state
  actions: read

jobs:
  watch:
    name: Scan watched scheduled workflows
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run watchdog
        # No pip install — watchdog + notifier are stdlib-only (importlib loads
        # notifier.py by file path, bypassing packages/swarm/__init__.py deps).
        env:
          # gh CLI uses this token to read workflow runs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
        run: python scripts/scheduled_workflow_watchdog.py

      - name: Persist notification log
        # notifier.py cooldown gate reads notification-log.jsonl. In CI each
        # run starts from a fresh checkout, so without commit-back the cooldown
        # forgets every hour → watchdog spams CEO. Commit the log so next run
        # sees the same history.
        run: |
          git config user.name "Atlas Watchdog"
          git config user.email "atlas-watchdog@volaura.app"
          if [ ! -f memory/atlas/notification-log.jsonl ]; then
            echo "No log to persist — nothing fired."
            exit 0
          fi
          git add memory/atlas/notification-log.jsonl
          if git diff --staged --quiet; then
            echo "Log unchanged — no commit needed."
            exit 0
          fi
          git commit -m "atlas-watchdog: notification log tick $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase --autostash origin main || true
          git push || echo "Push failed — next tick will retry"
