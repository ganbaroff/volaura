name: AURA Reconciler

# Closes ghost-audit P0-2.
# Picks up assessment sessions where pending_aura_sync=TRUE (set by
# complete_assessment intent-before-action), re-runs upsert_aura_score RPC,
# clears the flag on success. Caps per-session retries to avoid storms.
#
# Cadence: every 10 minutes. Cheap (partial index on pending_aura_sync=TRUE),
# almost always 0 rows in steady state.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no DB writes — safety check only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: aura-reconciler
  cancel-in-progress: false

jobs:
  reconcile:
    name: Run AURA reconciler
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run reconciler
        working-directory: apps/api
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AURA_RECONCILE_BATCH_SIZE: '50'
          AURA_RECONCILE_MAX_ATTEMPTS: '5'
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          python -c "
          import asyncio, os, sys
          sys.path.insert(0, '.')
          if os.environ.get('DRY_RUN') == 'true':
              print('DRY RUN: would call aura_reconciler.run_once() — skipping')
              sys.exit(0)
          from app.services.aura_reconciler import _main
          asyncio.run(_main())
          "
