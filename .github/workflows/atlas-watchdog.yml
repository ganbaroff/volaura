name: Atlas Workflow Watchdog

on:
  # Hourly scan. Catches silent-red CRONs within an hour of second failure.
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: atlas-watchdog
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  watch:
    name: Scan watched scheduled workflows
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run watchdog
        env:
          # gh CLI uses this token to read workflow runs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CEO_CHAT_ID: ${{ secrets.TELEGRAM_CEO_CHAT_ID }}
        run: python scripts/scheduled_workflow_watchdog.py
