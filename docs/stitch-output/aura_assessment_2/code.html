<!DOCTYPE html>

<html class="dark" lang="az"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#e4e1ed",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-primary-fixed": "#07006c",
                        "surface-tint": "#c0c1ff",
                        "on-tertiary-fixed": "#221b00",
                        "primary-container": "#8083ff",
                        "outline": "#908fa0",
                        "error": "#ffb4ab",
                        "secondary-fixed": "#e0e0ff",
                        "inverse-surface": "#e4e1ed",
                        "tertiary": "#e9c400",
                        "surface-bright": "#393841",
                        "surface-variant": "#34343d",
                        "surface-dim": "#13131b",
                        "tertiary-fixed-dim": "#e9c400",
                        "secondary-fixed-dim": "#bdc2ff",
                        "on-secondary-fixed": "#000767",
                        "secondary-container": "#2f3aa3",
                        "primary": "#c0c1ff",
                        "on-surface-variant": "#c7c4d7",
                        "on-tertiary-container": "#4c3f00",
                        "surface-container-low": "#1b1b23",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-container": "#1f1f27",
                        "on-error": "#690005",
                        "on-secondary": "#131e8c",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "inverse-primary": "#494bd6",
                        "surface-container-highest": "#34343d",
                        "surface": "#13131b",
                        "on-secondary-fixed-variant": "#2f3aa3",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0d0d15",
                        "on-background": "#e4e1ed",
                        "secondary": "#bdc2ff",
                        "tertiary-container": "#c9a900",
                        "tertiary-fixed": "#ffe16d",
                        "background": "#13131b",
                        "surface-container-high": "#292932",
                        "on-secondary-container": "#a8afff",
                        "on-tertiary": "#3a3000",
                        "error-container": "#93000a",
                        "outline-variant": "#464554",
                        "on-primary": "#1000a9",
                        "inverse-on-surface": "#303038",
                        "on-primary-container": "#0d0096",
                        "primary-fixed": "#e1e0ff"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            background-color: #13131b;
            color: #e4e1ed;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .plus-jakarta-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-effect {
            background: rgba(19, 19, 27, 0.7);
            backdrop-filter: blur(12px);
        }
        .aura-glow {
            box-shadow: 0 0 20px rgba(192, 193, 255, 0.1);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 py-4 w-full no-border bg-gradient-to-b from-[#1b1b23] to-transparent glass-effect">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#c0c1ff] active:scale-95 transition-transform duration-150 cursor-pointer">close</span>
<h1 class="plus-jakarta-sans font-semibold text-lg tracking-tight text-[#c0c1ff]">AURA Qiymətləndirmə</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-slate-500">help_outline</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-20 px-6 pb-32 max-w-2xl mx-auto w-full">
<!-- Progress Section -->
<div class="mb-10 mt-4">
<div class="flex justify-between items-end mb-3">
<div>
<span class="text-label-sm uppercase tracking-widest text-primary font-bold">Tərəqqi</span>
<p class="text-headline-md font-bold plus-jakarta-sans text-on-surface">70%</p>
</div>
<div class="text-right">
<span class="text-label-sm text-slate-500 font-medium">Mərhələ: 7 / 10</span>
</div>
</div>
<div class="h-2 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container rounded-full w-[70%] transition-all duration-1000 ease-out"></div>
</div>
</div>
<!-- Question Section -->
<section class="space-y-8">
<!-- Question Card -->
<div class="p-8 rounded-3xl bg-surface-container-low aura-glow relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-8xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<span class="inline-block px-3 py-1 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-tighter mb-4">Yumşaq Bacarıqlar • Situasiya</span>
<h2 class="text-xl md:text-2xl font-semibold plus-jakarta-sans leading-snug text-on-surface relative z-10">
                Tədbir zamanı gözlənilməz problem yarandıqda ilk addımınız nə olar?
            </h2>
</div>
<!-- Options List -->
<div class="grid gap-4">
<!-- Option 1 -->
<button class="group flex items-center p-5 rounded-2xl bg-surface-container-low hover:bg-surface-container-high active:scale-[0.98] transition-all duration-200 text-left border-2 border-transparent hover:border-primary/20">
<div class="w-10 h-10 rounded-xl bg-surface-container-high group-hover:bg-primary/20 flex items-center justify-center mr-4 transition-colors">
<span class="text-primary font-bold plus-jakarta-sans">A</span>
</div>
<span class="flex-1 text-on-surface group-hover:text-primary transition-colors font-medium">Dərhal koordinatordan kömək istəyərəm</span>
<span class="material-symbols-outlined text-slate-600 group-hover:text-primary opacity-0 group-hover:opacity-100 transition-all">chevron_right</span>
</button>
<!-- Option 2 (Selected State Example) -->
<button class="group flex items-center p-5 rounded-2xl bg-primary/10 text-left border-2 border-primary ring-1 ring-primary/30 active:scale-[0.98] transition-all duration-200">
<div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center mr-4">
<span class="text-on-primary font-bold plus-jakarta-sans">B</span>
</div>
<span class="flex-1 text-primary font-semibold">Vəziyyəti qiymətləndirib, mümkün həll yolları təklif edərəm</span>
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option 3 -->
<button class="group flex items-center p-5 rounded-2xl bg-surface-container-low hover:bg-surface-container-high active:scale-[0.98] transition-all duration-200 text-left border-2 border-transparent hover:border-primary/20">
<div class="w-10 h-10 rounded-xl bg-surface-container-high group-hover:bg-primary/20 flex items-center justify-center mr-4 transition-colors">
<span class="text-primary font-bold plus-jakarta-sans">C</span>
</div>
<span class="flex-1 text-on-surface group-hover:text-primary transition-colors font-medium">Digər könüllülərlə müzakirə edərəm</span>
<span class="material-symbols-outlined text-slate-600 group-hover:text-primary opacity-0 group-hover:opacity-100 transition-all">chevron_right</span>
</button>
<!-- Option 4 -->
<button class="group flex items-center p-5 rounded-2xl bg-surface-container-low hover:bg-surface-container-high active:scale-[0.98] transition-all duration-200 text-left border-2 border-transparent hover:border-primary/20">
<div class="w-10 h-10 rounded-xl bg-surface-container-high group-hover:bg-primary/20 flex items-center justify-center mr-4 transition-colors">
<span class="text-primary font-bold plus-jakarta-sans">D</span>
</div>
<span class="flex-1 text-on-surface group-hover:text-primary transition-colors font-medium">Problemi özüm həll etməyə çalışaram</span>
<span class="material-symbols-outlined text-slate-600 group-hover:text-primary opacity-0 group-hover:opacity-100 transition-all">chevron_right</span>
</button>
</div>
</section>
<!-- Decorative Achievement Aura -->
<div class="mt-12 flex justify-center">
<div class="relative w-24 h-24">
<div class="absolute inset-0 bg-primary/20 rounded-full blur-2xl animate-pulse"></div>
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-surface-container-high border-2 border-primary/30 aura-glow">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full p-6 glass-effect z-50">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
<button class="flex-1 py-4 px-6 rounded-2xl bg-surface-container-high text-on-surface font-semibold hover:bg-surface-variant transition-all active:scale-95 text-center plus-jakarta-sans">
            Geri
        </button>
<button class="flex-[2] py-4 px-6 rounded-2xl bg-gradient-to-r from-primary to-primary-container text-on-primary font-extrabold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all text-center plus-jakarta-sans">
            Növbəti
        </button>
</div>
</footer>
<!-- Background texture elements -->
<div class="fixed top-[20%] right-[-5%] w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[10%] left-[-10%] w-80 h-80 bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
