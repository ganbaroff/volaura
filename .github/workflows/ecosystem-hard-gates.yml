name: Ecosystem Hard Gates

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  hard-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify required governance docs exist
        run: |
          test -f docs/CURRENT-VS-TARGET-ARCHITECTURE-2026-04-21.md
          test -f docs/INTEGRATION-CONTRACT-LOCK-2026-04-21.md
          test -f docs/SWARM-GATES-MATRIX-2026-04-21.md

      - name: Contract phrase guard (prevent false unified-auth claims)
        run: |
          if rg -n "unified auth across all products is fully live" docs/ECOSYSTEM-MAP.md docs/MINDSHIFT-INTEGRATION-SPEC.md; then
            echo "Found stale unified-auth claim in docs."
            exit 1
          fi

      - name: Backend compliance tests
        run: |
          python -m pip install -r apps/api/requirements.txt
          python -m pip install pytest pytest-asyncio
          pytest apps/api/tests/test_auth.py apps/api/tests/test_auth_router.py apps/api/tests/test_grievance_router.py apps/api/tests/test_assessment_router.py apps/api/tests/test_assessment_completion_reconciler.py apps/api/tests/test_events_endpoints.py -q

      - name: Frontend launch-critical web tests
        run: pnpm --dir apps/web vitest run src/hooks/__tests__/use-grievance.test.ts src/hooks/__tests__/use-events.test.ts src/hooks/__tests__/use-organizations.test.ts src/lib/api/types.test.ts 'src/app/[locale]/(dashboard)/auth-recovery.test.ts' 'src/app/[locale]/(dashboard)/discover/error-state.test.ts' 'src/app/[locale]/callback/route-decision.test.ts' 'src/app/[locale]/(dashboard)/assessment/[sessionId]/resume.test.tsx' 'src/app/[locale]/(dashboard)/profile/edit/page.test.tsx'

      - name: E2E ownership note
        run: echo "Full E2E journey is owned by .github/workflows/e2e.yml"
