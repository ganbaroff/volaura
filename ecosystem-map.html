const W = window.innerWidth, H = window.innerHeight;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = W * devicePixelRatio;
canvas.height = H * devicePixelRatio;
ctx.scale(devicePixelRatio, devicePixelRatio);

// Initialize positions with cluster layout
const clusterCenters = {
  product: { x: W*0.5, y: H*0.35 },
  constitution: { x: W*0.5, y: H*0.15 },
  person: { x: W*0.35, y: H*0.2 },
  agent: { x: W*0.25, y: H*0.6 },
  code: { x: W*0.7, y: H*0.5 },
  memory: { x: W*0.65, y: H*0.75 },
  doc: { x: W*0.35, y: H*0.85 },
  infra: { x: W*0.75, y: H*0.3 },
};

nodes.forEach(n => {
  const c = clusterCenters[n.cat] || { x: W/2, y: H/2 };
  n.x = c.x + (Math.random() - 0.5) * 200;
  n.y = c.y + (Math.random() - 0.5) * 200;
  n.vx = 0; n.vy = 0;
  n.r = CATEGORIES[n.cat].radius;
});

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// Force simulation
let hoveredNode = null;
let selectedNode = null;
let activeCategory = null;
let searchTerm = '';
let camX = 0, camY = 0, camZoom = 1;
let isDragging = false, dragNode = null, lastMouse = {x:0,y:0};
let isPanning = false;

function applyForces() {
  const k = 0.0004;
  // Repulsion
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i+1; j < nodes.length; j++) {
      let dx = nodes[j].x - nodes[i].x;
      let dy = nodes[j].y - nodes[i].y;
      let d = Math.sqrt(dx*dx + dy*dy) || 1;
      let force = -800 / (d * d);
      let fx = force * dx / d, fy = force * dy / d;
      nodes[i].vx += fx; nodes[i].vy += fy;
      nodes[j].vx -= fx; nodes[j].vy -= fy;
    }
  }
  // Attraction (edges)
  edges.forEach(e => {
    let a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let d = Math.sqrt(dx*dx + dy*dy) || 1;
    let force = d * k;
    a.vx += force * dx / d; a.vy += force * dy / d;
    b.vx -= force * dx / d; b.vy -= force * dy / d;
  });
  // Cluster gravity
  nodes.forEach(n => {
    let c = clusterCenters[n.cat];
    if (c) {
      n.vx += (c.x - n.x) * 0.001;
      n.vy += (c.y - n.y) * 0.001;
    }
  });
  // Damping + position update
  nodes.forEach(n => {
    if (n === dragNode) return;
    n.vx *= 0.85; n.vy *= 0.85;
    n.x += n.vx; n.y += n.vy;
    n.x = Math.max(40, Math.min(W-40, n.x));
    n.y = Math.max(40, Math.min(H-40, n.y));
  });
}

function isVisible(n) {
  if (activeCategory && n.cat !== activeCategory) return false;
  if (searchTerm && !n.label.toLowerCase().includes(searchTerm) && !n.id.toLowerCase().includes(searchTerm)) return false;
  return true;
}

function getConnectedIds(nodeId) {
  const ids = new Set();
  edges.forEach(e => {
    if (e.from === nodeId) ids.add(e.to);
    if (e.to === nodeId) ids.add(e.from);
  });
  return ids;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(camZoom, camZoom);

  const connected = (hoveredNode || selectedNode) ? getConnectedIds((hoveredNode||selectedNode).id) : null;

  // Draw edges
  edges.forEach(e => {
    let a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    let vis = isVisible(a) && isVisible(b);
    let highlight = connected && (connected.has(e.from) || connected.has(e.to)) &&
      ((hoveredNode||selectedNode).id === e.from || (hoveredNode||selectedNode).id === e.to);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = highlight ? 'rgba(212,180,255,0.6)' : vis ? 'rgba(212,180,255,0.08)' : 'rgba(212,180,255,0.02)';
    ctx.lineWidth = highlight ? 2 : 0.5;
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    let vis = isVisible(n);
    let isHovered = hoveredNode === n;
    let isSelected = selectedNode === n;
    let isConnected = connected && connected.has(n.id);
    let alpha = vis ? (isHovered || isSelected || isConnected ? 1 : (connected ? 0.2 : 0.85)) : 0.05;

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    let col = CATEGORIES[n.cat].color;
    ctx.fillStyle = col.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#', '');
    // Hex to rgba
    let r = parseInt(col.slice(1,3),16), g = parseInt(col.slice(3,5),16), b = parseInt(col.slice(5,7),16);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fill();

    if (isHovered || isSelected) {
      ctx.strokeStyle = `rgba(${r},${g},${b},0.8)`;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Glow
      ctx.shadowColor = col;
      ctx.shadowBlur = 20;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Label
    if (vis && (n.r > 10 || isHovered || isSelected || isConnected || camZoom > 1.2)) {
      ctx.fillStyle = `rgba(232,224,240,${alpha})`;
      ctx.font = `${isHovered || isSelected ? 'bold ' : ''}${n.r > 14 ? 13 : 11}px Inter, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(n.label, n.x, n.y + n.r + 14);
    }
  });

  ctx.restore();

  applyForces();
  requestAnimationFrame(draw);
}

// ── LEGEND ────────────────────────────────────────────────
const legend = document.getElementById('legend');
Object.entries(CATEGORIES).forEach(([key, val]) => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<div class="legend-dot" style="background:${val.color}"></div>${val.label}`;
  el.onclick = () => {
    activeCategory = activeCategory === key ? null : key;
    document.querySelectorAll('.legend-item').forEach(l => l.classList.remove('active'));
    if (activeCategory) el.classList.add('active');
  };
  legend.appendChild(el);
});

// ── SEARCH ────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase();
});

// ── MOUSE ─────────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return { x: (sx - camX) / camZoom, y: (sy - camY) / camZoom };
}

function findNode(mx, my) {
  let wp = screenToWorld(mx, my);
  for (let i = nodes.length-1; i >= 0; i--) {
    let n = nodes[i];
    let dx = wp.x - n.x, dy = wp.y - n.y;
    if (dx*dx + dy*dy < (n.r+4)*(n.r+4)) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  let mx = e.clientX, my = e.clientY;
  if (dragNode) {
    let wp = screenToWorld(mx, my);
    dragNode.x = wp.x; dragNode.y = wp.y;
    dragNode.vx = 0; dragNode.vy = 0;
    return;
  }
  if (isPanning) {
    camX += mx - lastMouse.x;
    camY += my - lastMouse.y;
    lastMouse = {x: mx, y: my};
    return;
  }
  let n = findNode(mx, my);
  hoveredNode = n;
  canvas.style.cursor = n ? 'pointer' : 'grab';
  let tooltip = document.getElementById('tooltip');
  if (n) {
    tooltip.style.display = 'block';
    tooltip.style.left = (mx + 12) + 'px';
    tooltip.style.top = (my - 10) + 'px';
    tooltip.innerHTML = `<strong style="color:${CATEGORIES[n.cat].color}">${n.label}</strong><br><span style="color:#8B7AAF">${CATEGORIES[n.cat].label}</span>`;
  } else {
    tooltip.style.display = 'none';
  }
});

canvas.addEventListener('mousedown', e => {
  let n = findNode(e.clientX, e.clientY);
  if (n) {
    dragNode = n;
    selectedNode = n;
    openSidebar(n);
  } else {
    isPanning = true;
    lastMouse = {x: e.clientX, y: e.clientY};
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mouseup', () => {
  dragNode = null;
  isPanning = false;
  canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  let factor = e.deltaY > 0 ? 0.9 : 1.1;
  let mx = e.clientX, my = e.clientY;
  camX = mx - (mx - camX) * factor;
  camY = my - (my - camY) * factor;
  camZoom *= factor;
  camZoom = Math.max(0.3, Math.min(3, camZoom));
}, { passive: false });

// ── SIDEBAR ───────────────────────────────────────────────
function openSidebar(node) {
  let sb = document.getElementById('sidebar');
  let connected = getConnectedIds(node.id);
  let connectedNodes = nodes.filter(n => connected.has(n.id));
  let inEdges = edges.filter(e => e.to === node.id).length;
  let outEdges = edges.filter(e => e.from === node.id).length;

  document.getElementById('sidebar-content').innerHTML = `
    <h2>${node.label}</h2>
    <div class="type">${CATEGORIES[node.cat].label}</div>
    <p style="font-size:13px;line-height:1.5;color:#C0B0D8;margin-bottom:16px">${node.detail}</p>
    <div class="stat"><span>Connections</span><span style="color:#D4B4FF">${connected.size}</span></div>
    <div class="stat"><span>Incoming</span><span style="color:#D4B4FF">${inEdges}</span></div>
    <div class="stat"><span>Outgoing</span><span style="color:#D4B4FF">${outEdges}</span></div>
    <div class="refs">
      <h2 style="margin-top:16px">Connected To</h2>
      ${connectedNodes.map(cn => `
        <div class="ref-item" onclick="focusNode('${cn.id}')" style="border-left: 3px solid ${CATEGORIES[cn.cat].color}">
          ${cn.label} <span style="color:#8B7AAF;font-size:11px">${CATEGORIES[cn.cat].label}</span>
        </div>
      `).join('')}
    </div>
  `;
  sb.classList.add('open');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  selectedNode = null;
}

function focusNode(id) {
  let n = nodeMap[id];
  if (!n) return;
  selectedNode = n;
  openSidebar(n);
  // Pan to node
  camX = W/2 - n.x * camZoom;
  camY = H/2 - n.y * camZoom;
}

// Start
draw();
</script>
